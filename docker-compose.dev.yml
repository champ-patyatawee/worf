# Dev Docker Compose - Local Development
# Usage: docker compose -f docker-compose.dev.yml up -d
# First-time DB setup: docker compose -f docker-compose.dev.yml --profile db-init up -d

services:
  # ─── API Gateway ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: dev_traefik
    command:
      # Use file-based dynamic config (more reliable on macOS)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      # Watch for file changes
      - "--providers.file.watch=true"
      # HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # Enable API + dashboard for debugging
      - "--entrypoints.traefik.address=:8080"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./traefik-dynamic.dev.yml:/etc/traefik/dynamic.yml
    networks:
      - dev_network

  # ─── Auth Service (JWT validation for Traefik ForwardAuth) ──
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: dev_auth_service
    expose:
      - "3010"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: 3010
    networks:
      - dev_network

  # ─── Database ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: dev_postgres
    environment:
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace_dev
      POSTGRES_DB: workspace
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d workspace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev_network

  # ─── Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dev_redis
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dev_network

  # ─── Workspace API ───────────────────────────────────────────
  workspace-api:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: hf_EzvLVLoXXXXX
    container_name: dev_workspace_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      NODE_ENV: development
      PORT: 3001
      CLIENT_URL: http://localhost
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network

  # ─── Embedding Worker ────────────────────────────────────────
  embedding-worker:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile.embedding-worker
      args:
        HF_TOKEN: hf_EzvLVLoTSXXXXXXXX
    container_name: dev_embedding_worker
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  # ─── Note API ────────────────────────────────────────────────
  note-api:
    build:
      context: ./services/note-api
      dockerfile: Dockerfile
    container_name: dev_note_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/note?schema=public
      WORKSPACE_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./services/note-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  # ─── Kanban API ──────────────────────────────────────────────
  kanban:
    build:
      context: ./services/kanban-api
      dockerfile: Dockerfile
    container_name: dev_kanban
    ports:
      - "8000:8000"
    environment:
      KANBAN_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/kanban
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: workspace
      DB_PASSWORD: workspace_dev
      DB_NAME: workspace
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  # ─── Frontend ────────────────────────────────────────────────
  web:
    build:
      context: ./apps/workspace-web
      dockerfile: Dockerfile
    container_name: dev_web
    ports:
      - "5173:5173"
    environment:
      TRAEFIK_URL: http://traefik
      VITE_API_URL: /ws
      VITE_WS_URL: /ws
      VITE_PROXY_URL: /ws
      VITE_NOTE_API_URL: /notes
      VITE_KANBAN_API_URL: /kanban
    volumes:
      - ./apps/workspace-web:/app
      - /app/node_modules
    depends_on:
      - workspace-api
    networks:
      - dev_network

  # ─── Init Containers (profile: db-init) ──────────────────────
  workspace-api-init:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: hf_EzvLVLoXXXXX
    command: ["sh", "-c", "npx prisma db push && npx tsx prisma/seed.ts"]
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

  note-api-init:
    build:
      context: ./services/note-api
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma db push && npx tsx prisma/seed.ts"]
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/note
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

  kanban-api-init:
    build:
      context: ./services/kanban-api
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma db push"]
    environment:
      KANBAN_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/kanban
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

volumes:
  dev_postgres_data:
  dev_redis_data:

networks:
  dev_network:
    driver: bridge