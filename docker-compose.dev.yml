# Dev Docker Compose - Local Development
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: dev_postgres
    environment:
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace_dev
      POSTGRES_DB: workspace
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d workspace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev_network

 
  redis:
    image: redis:7-alpine
    container_name: dev_redis
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dev_network

  workspace-api:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: hf_EzvLVLoXXXXX
    container_name: dev_workspace_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      NODE_ENV: development
      PORT: 3001
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network

  embedding-worker:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile.embedding-worker
      args:
        HF_TOKEN: hf_EzvLVLoTSXXXXXXXX
    container_name: dev_embedding_worker
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  note-api:
    build:
      context: ./services/note-api
      dockerfile: Dockerfile
    container_name: dev_note_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/note?schema=public
      WORKSPACE_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./services/note-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  workspace-api-init:
    build:
      context: ./services/workspace-api
      dockerfile: Dockerfile
      args:
        HF_TOKEN: hf_EzvLVLoXXXXX
    command: ["sh", "-c", "npx prisma db push && npx tsx prisma/seed.ts"]
    volumes:
      - ./services/workspace-api:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/workspace
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

  note-api-init:
    build:
      context: ./services/note-api
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma db push && npx tsx prisma/seed.ts"]
    environment:
      DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/note
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

  kanban-api-init:
    build:
      context: ./services/kanban-api
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma db push"]
    environment:
      KANBAN_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/kanban
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - db-init

  web:
    build:
      context: ./apps/workspace-web
      dockerfile: Dockerfile
    container_name: dev_web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
      VITE_PROXY_URL: http://localhost:3001
      VITE_NOTE_API_URL: http://localhost:3000
      VITE_KANBAN_API_URL: http://localhost:8000
    volumes:
      - ./apps/workspace-web:/app
      - /app/node_modules
    depends_on:
      - workspace-api
    networks:
      - dev_network

  kanban:
    build:
      context: ./services/kanban-api
      dockerfile: Dockerfile
    container_name: dev_kanban
    ports:
      - "8000:8000"
    environment:
      KANBAN_DATABASE_URL: postgresql://workspace:workspace_dev@postgres:5432/kanban
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: workspace
      DB_PASSWORD: workspace_dev
      DB_NAME: workspace
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

volumes:
  dev_postgres_data:
  dev_redis_data:

networks:
  dev_network:
    driver: bridge
