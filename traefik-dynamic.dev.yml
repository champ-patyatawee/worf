# Traefik Dynamic Configuration — Dev Compose
# Services are on a Docker network, reachable by service name.

http:
  middlewares:
    strip-ws:
      stripPrefix:
        prefixes:
          - "/ws"

    strip-notes:
      stripPrefix:
        prefixes:
          - "/notes"

    strip-kanban:
      stripPrefix:
        prefixes:
          - "/kanban"

    auth-middleware:
      forwardAuth:
        address: "http://auth-service:3010/verify"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Email"
          - "X-User-Role"
        trustForwardHeader: true

    ws-auth-chain:
      chain:
        middlewares:
          - strip-ws
          - auth-middleware

  services:
    workspace-api:
      loadBalancer:
        servers:
          - url: "http://workspace-api:3001"

    note-api:
      loadBalancer:
        servers:
          - url: "http://note-api:3000"

    kanban-api:
      loadBalancer:
        servers:
          - url: "http://kanban:8000"

    web-frontend:
      loadBalancer:
        servers:
          - url: "http://web:5173"

  routers:
    ws-api-auth:
      rule: "PathPrefix(`/ws/api/auth`)"
      service: workspace-api
      middlewares:
        - strip-ws
      priority: 100

    ws-api-socket:
      rule: "PathPrefix(`/socket.io`) || PathPrefix(`/ws/socket.io`)"
      service: workspace-api
      priority: 100

    ws-api:
      rule: "PathPrefix(`/ws`)"
      service: workspace-api
      middlewares:
        - ws-auth-chain

    note-api:
      rule: "PathPrefix(`/notes`)"
      service: note-api
      middlewares:
        - strip-notes
        - auth-middleware

    kanban-api:
      rule: "PathPrefix(`/kanban`)"
      service: kanban-api
      middlewares:
        - strip-kanban
        - auth-middleware

    web:
      rule: "PathPrefix(`/`)"
      service: web-frontend
      priority: 1
